<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="add-book-container">
    <img src="photo-wood-texture-pattern_58702-15448.jpg" class="wood-background">
    <button id="add-book">Add Book +</button>

    <form id="add-book-form" class="hidden">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required
        <label for="author">Author</label>
        <input type="text" name="author" id="author" required>
        <label for="pages">Pages</label>
        <input type="number" name="pages" id="pages" required>
        <label for="read">read</label>
        <input type="radio" name="read-status" id="read" value="read" required>
        <label for="havent-read">not read</label>
        <input type="radio" name="read-status" id="havent-read"   value="havent-read">
        <button type="submit" id="submit">Add</button>

    </form>
    </div>
    <div id="books-container">
  
        
    </div>
    <div class="background">
        <img src="shelf.jpg">
    </div>
    <script src="index.js"></script>
</body>
</html>
